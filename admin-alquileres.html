<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Alquileres — Eckerdt Negocios Inmobiliarios</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --negro:#0A0A0A;
  --negro2:#141414;
  --negro3:#1e1e1e;
  --negro4:#2a2a2a;
  --celeste:#4BC8E8;
  --azul:#3A9DB5;
  --petroleo:#2B6B7A;
  --naranja:#F5A623;
  --naranja2:#e09010;
  --blanco:#ffffff;
  --gris1:#f0f0f0;
  --gris2:#cccccc;
  --gris3:#888888;
  --gris4:#444444;
  --verde:#27ae60;
  --rojo:#e74c3c;
  --amarillo:#f39c12;
}
body{background:var(--negro);color:var(--blanco);font-family:'Inter',sans-serif;font-size:13px}
.app{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:230px;min-height:100vh;background:var(--negro2);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100;border-right:1px solid var(--negro4)}
.logo-wrap{padding:22px 18px 18px;border-bottom:1px solid var(--negro4)}
.logo-icon{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.logo-m{width:36px;height:28px;position:relative}
.logo-m svg{width:100%;height:100%}
.logo-texts{}
.logo-brand{font-size:15px;font-weight:700;color:var(--blanco);letter-spacing:.5px;line-height:1.2}
.logo-brand span{color:var(--celeste)}
.logo-sub{font-size:9px;color:var(--gris3);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}

.nav{list-style:none;padding:12px 0;flex:1}
.nav li{display:flex;align-items:center;gap:10px;padding:10px 18px;cursor:pointer;font-size:12px;color:var(--gris3);border-left:3px solid transparent;transition:all .15s;letter-spacing:.2px}
.nav li:hover{color:var(--blanco);background:var(--negro3)}
.nav li.on{color:var(--celeste);border-left-color:var(--naranja);background:rgba(75,200,232,.07)}
.nav li .ic{font-size:15px;width:20px;text-align:center}

.sync-bar{display:flex;align-items:center;gap:6px;padding:10px 18px;font-size:10px;color:var(--gris4);border-top:1px solid var(--negro4)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--verde);flex-shrink:0}
.sync-dot.off{background:var(--rojo);animation:pulse 1.5s infinite}
.sidebar-foot{padding:10px 18px;font-size:10px;color:var(--gris4);border-top:1px solid var(--negro4)}

/* MAIN */
.main{margin-left:230px;flex:1;padding:28px 32px;background:var(--negro)}
.ph{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--negro4)}
.pt{font-size:22px;font-weight:700;color:var(--blanco)}
.ps{font-size:11px;color:var(--gris3);margin-top:3px;letter-spacing:.3px}
.ph-line{display:flex;align-items:center;gap:6px}
.ph-line::before{content:'';width:3px;height:22px;background:linear-gradient(180deg,var(--naranja),var(--celeste));border-radius:2px}

/* BOTONES */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--negro4);background:var(--negro3);color:var(--blanco);border-radius:6px;transition:all .15s}
.btn:hover{background:var(--negro4);border-color:var(--gris4)}
.btn.primary{background:linear-gradient(135deg,var(--celeste),var(--azul));border-color:var(--celeste);color:var(--negro)}
.btn.primary:hover{opacity:.9}
.btn.naranja{background:var(--naranja);border-color:var(--naranja);color:var(--negro);font-weight:600}
.btn.naranja:hover{background:var(--naranja2);border-color:var(--naranja2)}
.btn.verde{background:var(--verde);border-color:var(--verde);color:#fff}
.btn.verde:hover{opacity:.85}
.btn.sm{padding:4px 10px;font-size:11px}

/* KPI CARDS */
.kgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.kcard{background:var(--negro2);border:1px solid var(--negro4);border-radius:10px;padding:18px;position:relative;overflow:hidden;transition:border-color .2s}
.kcard:hover{border-color:var(--negro4)}
.kcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:10px 10px 0 0}
.kcard.c1::before{background:linear-gradient(90deg,var(--celeste),var(--azul))}
.kcard.c2::before{background:linear-gradient(90deg,var(--naranja),var(--naranja2))}
.kcard.c3::before{background:linear-gradient(90deg,var(--verde),#1e8449)}
.kcard.c4::before{background:linear-gradient(90deg,var(--rojo),#c0392b)}
.kcard-icon{font-size:22px;margin-bottom:10px;opacity:.8}
.klbl{font-size:10px;color:var(--gris3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px}
.kval{font-size:24px;font-weight:700;color:var(--blanco);line-height:1}
.ksub{font-size:10px;color:var(--gris3);margin-top:6px}

/* ALERTAS */
.alerts{display:flex;flex-direction:column;gap:8px;margin-bottom:22px}
.alert{display:flex;align-items:center;gap:12px;background:var(--negro2);border:1px solid var(--negro4);border-left:3px solid;border-radius:8px;padding:11px 14px;font-size:12px}
.alert strong{display:block;font-weight:500;color:var(--blanco)}
.alert span{font-size:11px;color:var(--gris3)}

/* SECTION TITLE */
.stitle{font-size:11px;font-weight:600;color:var(--gris3);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.stitle::after{content:'';flex:1;height:1px;background:var(--negro4)}

/* TABLA */
.tw{background:var(--negro2);border:1px solid var(--negro4);border-radius:10px;overflow:hidden;margin-bottom:18px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:var(--negro3);border-bottom:1px solid var(--negro4)}
th{padding:10px 14px;text-align:left;font-size:10px;color:var(--gris3);letter-spacing:.8px;text-transform:uppercase;font-weight:500}
td{padding:10px 14px;color:var(--gris2);border-bottom:1px solid var(--negro4)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(75,200,232,.04)}
.tdm{color:var(--blanco);font-weight:500}

/* BADGES */
.badge{display:inline-block;padding:3px 9px;font-size:10px;font-weight:600;border-radius:20px}
.bg{background:rgba(39,174,96,.15);color:#5ddb8a;border:1px solid rgba(39,174,96,.3)}
.br{background:rgba(231,76,60,.15);color:#ff7b6b;border:1px solid rgba(231,76,60,.3)}
.by{background:rgba(243,156,18,.15);color:#f5c842;border:1px solid rgba(243,156,18,.3)}
.bgr{background:var(--negro3);color:var(--gris3);border:1px solid var(--negro4)}

/* FILTROS */
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.inp{padding:8px 12px;font-family:'Inter',sans-serif;font-size:12px;border:1px solid var(--negro4);border-radius:6px;background:var(--negro2);color:var(--blanco);outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--celeste)}
.inp option{background:var(--negro2)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(4px)}
.modal{background:var(--negro2);border:1px solid var(--negro4);border-radius:12px;width:520px;max-height:90vh;overflow-y:auto;padding:28px;position:relative}
.modal::-webkit-scrollbar{width:4px}
.modal::-webkit-scrollbar-track{background:var(--negro3)}
.modal::-webkit-scrollbar-thumb{background:var(--negro4);border-radius:2px}
.mt{font-size:17px;font-weight:700;color:var(--blanco);margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--negro4);display:flex;align-items:center;gap:8px}
.mt-icon{width:28px;height:28px;border-radius:6px;background:linear-gradient(135deg,var(--celeste),var(--azul));display:flex;align-items:center;justify-content:center;font-size:14px}
.mc{position:absolute;top:16px;right:16px;background:var(--negro3);border:1px solid var(--negro4);border-radius:6px;font-size:14px;cursor:pointer;color:var(--gris3);width:28px;height:28px;display:flex;align-items:center;justify-content:center}
.mc:hover{color:var(--blanco);background:var(--negro4)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg-full{grid-column:1/-1}
label.fl{font-size:10px;color:var(--gris3);letter-spacing:.6px;text-transform:uppercase;display:block;margin-bottom:5px;font-weight:500}
.fa{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:14px;border-top:1px solid var(--negro4)}

/* LIQUIDACION */
.lcard{background:var(--negro2);border:1px solid var(--negro4);border-radius:10px;padding:20px;margin-bottom:14px}
.lrow{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--negro4);font-size:12px;color:var(--gris2)}
.lrow.tot{border:none;border-top:1px solid var(--negro4);font-weight:700;font-size:14px;color:var(--blanco);margin-top:4px}
.lrow-red{color:#ff7b6b}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;height:120px;font-size:12px;color:var(--gris3);gap:10px}
.spinner{width:18px;height:18px;border:2px solid var(--negro4);border-top-color:var(--celeste);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--negro2);border:1px solid var(--celeste);color:var(--blanco);padding:12px 18px;font-size:12px;border-radius:8px;opacity:0;transition:opacity .3s;z-index:999;pointer-events:none;display:flex;align-items:center;gap:8px}
.toast.show{opacity:1}
.toast-dot{width:8px;height:8px;border-radius:50%;background:var(--celeste)}

.empty{text-align:center;padding:40px;color:var(--gris4);font-size:12px}

/* SCROLLBAR GLOBAL */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--negro)}
::-webkit-scrollbar-thumb{background:var(--negro4);border-radius:3px}
</style>
</head>
<body>

<div id="app"></div>
<div class="toast" id="toast"><div class="toast-dot"></div><span id="toast-msg">Guardado</span></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBXeFV7uLx5Qm9vwPB-nhYsSPL0SCtVyCQ",
  authDomain: "inmobiliaria-eckerdt.firebaseapp.com",
  projectId: "inmobiliaria-eckerdt",
  storageBucket: "inmobiliaria-eckerdt.firebasestorage.app",
  messagingSenderId: "1047209623065",
  appId: "1:1047209623065:web:c655f682cc895a852fb488"
};

const fireApp = initializeApp(firebaseConfig);
const db = getFirestore(fireApp);

let S = {
  seccion:'dashboard',
  propietarios:[], propiedades:[], contratos:[], pagos:[],
  modal:null, form:{},
  filtros:{buscar:'', buscarPor:'inquilino', estado:'todos'},
  liqMes:'',
  synced:false, loading:true,
};

const $ = id => document.getElementById(id);
const moneda = n => '$' + Math.round(n||0).toLocaleString('es-AR');
const hoy = () => new Date().toISOString().split('T')[0];
const diasPara = fin => Math.round((new Date(fin) - new Date()) / 86400000);

function toast(msg, ok=true) {
  $('toast-msg').textContent = msg;
  const t = $('toast');
  t.querySelector('.toast-dot').style.background = ok ? '#4BC8E8' : '#e74c3c';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

function badge(e) {
  const m={activo:'bg Activo',cobrado:'bg Cobrado',pendiente:'by Pendiente',vencido:'br Vencido'};
  const [c,l]=(m[e]||'bgr '+e).split(' ');
  return `<span class="badge ${c}">${l}</span>`;
}

function logoSVG(size=36) {
  return `<svg width="${size}" height="${size*0.78}" viewBox="0 0 46 36" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 34L14 4L23 20L32 4L44 34" stroke="none"/>
    <polygon points="2,34 14,4 20,16" fill="#4BC8E8"/>
    <polygon points="14,4 20,16 23,20" fill="#2B6B7A"/>
    <polygon points="23,20 26,16 32,4" fill="#2B6B7A"/>
    <polygon points="26,16 32,4 44,34" fill="#3A9DB5"/>
    <polygon points="20,16 26,16 23,20" fill="#1a4a58"/>
    <circle cx="23" cy="3" r="4" fill="#F5A623"/>
    <circle cx="23" cy="3" r="1.8" fill="#0A0A0A"/>
  </svg>`;
}

async function fbAdd(col, data) {
  try {
    const ref = await addDoc(collection(db, col), {...data, _ts:Date.now()});
    toast('Guardado en Firebase ✓');
    return ref.id;
  } catch(e) { toast('Error: '+e.message, false); return null; }
}
async function fbUpdate(col, id, data) {
  try {
    await updateDoc(doc(db, col, id), {...data, _ts:Date.now()});
    toast('Actualizado ✓');
  } catch(e) { toast('Error: '+e.message, false); }
}

async function cargarTodo() {
  S.loading=true; render();
  try {
    for (const col of ['propietarios','propiedades','contratos','pagos']) {
      const snap = await getDocs(collection(db, col));
      S[col] = snap.docs.map(d=>({...d.data(),_id:d.id}));
    }
    if(S.propietarios.length===0) await cargarDemo();
    const meses=[...new Set(S.pagos.map(p=>p.mes))].sort().reverse();
    S.liqMes = meses[0]||'';
    S.synced=true;
  } catch(e) { toast('Error Firebase: '+e.message,false); }
  S.loading=false; render();
}

async function cargarDemo() {
  const props=[
    {id:'p1',nombre:'Carlos Méndez',telefono:'3442-412345',email:'carlos@email.com'},
    {id:'p2',nombre:'Ana Fernández',telefono:'3442-567890',email:'ana@email.com'},
    {id:'p3',nombre:'Luis Rodríguez',telefono:'3442-998877',email:'luis@email.com'},
  ];
  const propis=[
    {id:'pr1',propietarioId:'p1',direccion:'Mitre 320',tipo:'Casa',descripcion:'3 dorm.'},
    {id:'pr2',propietarioId:'p1',direccion:'San Martín 145 1°A',tipo:'Dpto',descripcion:'2 dorm.'},
    {id:'pr3',propietarioId:'p2',direccion:'Rivadavia 890',tipo:'Local',descripcion:'60m²'},
    {id:'pr4',propietarioId:'p3',direccion:'Belgrano 210',tipo:'Casa',descripcion:'2 dorm.'},
  ];
  const conts=[
    {id:'c1',propiedadId:'pr1',inquilino:'Martín Suárez',dni:'32.111.222',telefono:'3442-111222',email:'martin@gmail.com',inicio:'2024-01-01',fin:'2025-12-31',alquilerBase:180000,comisionAgencia:5,estado:'activo',garantia:'Personal - Roberto Suárez'},
    {id:'c2',propiedadId:'pr2',inquilino:'Sofía Torres',dni:'35.444.555',telefono:'3442-444555',email:'sofia@gmail.com',inicio:'2024-06-01',fin:'2026-05-31',alquilerBase:220000,comisionAgencia:5,estado:'activo',garantia:'Inmueble - Sarmiento 400'},
    {id:'c3',propiedadId:'pr3',inquilino:'Comercial Perez SA',dni:'30-71234567-9',telefono:'3442-777888',email:'comercial@perez.com',inicio:'2023-03-01',fin:'2026-06-15',alquilerBase:350000,comisionAgencia:8,estado:'activo',garantia:'Seguro de caución'},
  ];
  const pagos=[
    {id:'pg1',contratoId:'c1',mes:'Mayo 2025',monto:195000,fecha:'2025-05-05',estado:'cobrado',comprobante:'REC-001'},
    {id:'pg2',contratoId:'c1',mes:'Abril 2025',monto:195000,fecha:'2025-04-03',estado:'cobrado',comprobante:'REC-002'},
    {id:'pg3',contratoId:'c2',mes:'Mayo 2025',monto:235000,fecha:null,estado:'pendiente',comprobante:''},
    {id:'pg4',contratoId:'c3',mes:'Mayo 2025',monto:385000,fecha:null,estado:'vencido',comprobante:''},
    {id:'pg5',contratoId:'c3',mes:'Abril 2025',monto:375000,fecha:null,estado:'vencido',comprobante:''},
  ];
  for(const x of props){const r=await addDoc(collection(db,'propietarios'),x);S.propietarios.push({...x,_id:r.id});}
  for(const x of propis){const r=await addDoc(collection(db,'propiedades'),x);S.propiedades.push({...x,_id:r.id});}
  for(const x of conts){const r=await addDoc(collection(db,'contratos'),x);S.contratos.push({...x,_id:r.id});}
  for(const x of pagos){const r=await addDoc(collection(db,'pagos'),x);S.pagos.push({...x,_id:r.id});}
  S.liqMes='Mayo 2025';
}

window.go=s=>{S.seccion=s;S.modal=null;S.filtros={buscar:'',buscarPor:'inquilino',estado:'todos'};render();};
window.openModal=t=>{S.modal=t;S.form={comisionAgencia:'5',estado:'activo',tipo:'Casa'};render();};
window.closeModal=()=>{S.modal=null;render();};
window.setFiltro=(k,v)=>{S.filtros[k]=v;render();};
window.setLiqMes=v=>{S.liqMes=v;render();};

window.guardarContrato=async()=>{
  const f=S.form;
  if(!f.propiedadId||!f.inquilino||!f.inicio)return toast('Completá los campos obligatorios',false);
  const data={...f,propiedadId:f.propiedadId,alquilerBase:+(f.alquilerBase||0),comisionAgencia:+(f.comisionAgencia||5),estado:'activo'};
  const id=await fbAdd('contratos',data);
  if(id){S.contratos.unshift({...data,_id:id});S.modal=null;render();}
};
window.guardarPago=async()=>{
  const f=S.form;
  if(!f.contratoId||!f.mes)return toast('Completá los campos obligatorios',false);
  const data={...f,contratoId:f.contratoId,monto:+(f.monto||0)};
  const id=await fbAdd('pagos',data);
  if(id){S.pagos.unshift({...data,_id:id});S.modal=null;render();}
};
window.guardarPropietario=async()=>{
  const f=S.form;
  if(!f.nombre)return toast('Ingresá el nombre',false);
  const id=await fbAdd('propietarios',f);
  if(id){S.propietarios.push({...f,_id:id});S.modal=null;render();}
};
window.guardarPropiedad=async()=>{
  const f=S.form;
  if(!f.propietarioId||!f.direccion)return toast('Completá los campos obligatorios',false);
  const id=await fbAdd('propiedades',f);
  if(id){S.propiedades.push({...f,_id:id});S.modal=null;render();}
};
window.cobrar=async(fid)=>{
  const upd={estado:'cobrado',fecha:hoy()};
  await fbUpdate('pagos',fid,upd);
  S.pagos=S.pagos.map(x=>x._id===fid?{...x,...upd}:x);
  render();
};

function getProp(c){return S.propiedades.find(p=>p.id===c.propiedadId||p._id===c.propiedadId);}
function getOwner(pr){return pr?S.propietarios.find(o=>o.id===pr.propietarioId||o._id===pr.propietarioId):null;}
function getCont(p){return S.contratos.find(x=>x.id===p.contratoId||x._id===p.contratoId);}

function renderDashboard(){
  const activos=S.contratos.filter(c=>c.estado==='activo');
  const totalAlq=activos.reduce((s,c)=>s+c.alquilerBase,0);
  const totalCom=activos.reduce((s,c)=>s+(c.alquilerBase*c.comisionAgencia/100),0);
  const pend=S.pagos.filter(p=>p.estado==='pendiente'||p.estado==='vencido');
  const montoPend=pend.reduce((s,p)=>s+p.monto,0);

  const alertas=[];
  activos.forEach(c=>{
    const d=diasPara(c.fin);
    const pr=getProp(c);
    if(d<=0) alertas.push({col:'var(--rojo)',t:`Contrato vencido: ${pr?.direccion||''}`,s:`${c.inquilino} · Venció el ${c.fin}`});
    else if(d<=60) alertas.push({col:'var(--naranja)',t:`Por vencer: ${pr?.direccion||''}`,s:`${c.inquilino} · Vence en ${d} días`});
  });
  S.pagos.filter(p=>p.estado==='vencido').forEach(p=>{
    const c=getCont(p);
    const pr=c?getProp(c):null;
    alertas.push({col:'var(--rojo)',t:`Pago vencido: ${pr?.direccion||''}`,s:`${c?.inquilino||''} · ${p.mes} · ${moneda(p.monto)}`});
  });

  const ultPagos=S.pagos.slice(0,6).map(p=>{
    const c=getCont(p);
    const pr=c?getProp(c):null;
    return `<tr><td class="tdm">${c?.inquilino||''}</td><td>${pr?.direccion||''}</td><td>${p.mes}</td><td>${moneda(p.monto)}</td><td>${badge(p.estado)}</td><td>${p.fecha||'—'}</td></tr>`;
  }).join('');

  return `
  <div class="kgrid">
    <div class="kcard c1"><div class="kcard-icon">📋</div><div class="klbl">Contratos activos</div><div class="kval">${activos.length}</div><div class="ksub">de ${S.contratos.length} totales</div></div>
    <div class="kcard c2"><div class="kcard-icon">💰</div><div class="klbl">Alquileres / mes</div><div class="kval" style="font-size:18px">${moneda(totalAlq)}</div><div class="ksub">cartera activa</div></div>
    <div class="kcard c3"><div class="kcard-icon">🏦</div><div class="klbl">Comisiones / mes</div><div class="kval" style="font-size:18px">${moneda(totalCom)}</div><div class="ksub">honorarios agencia</div></div>
    <div class="kcard c4"><div class="kcard-icon">⚠️</div><div class="klbl">Saldo pendiente</div><div class="kval" style="font-size:18px">${moneda(montoPend)}</div><div class="ksub">${pend.length} cuota(s) sin cobrar</div></div>
  </div>
  ${alertas.length?`<div class="stitle">Alertas</div><div class="alerts">${alertas.map(a=>`<div class="alert" style="border-left-color:${a.col}"><div><strong>${a.t}</strong><span>${a.s}</span></div></div>`).join('')}</div>`:''}
  <div class="stitle">Últimos movimientos</div>
  <div class="tw"><table><thead><tr><th>Inquilino</th><th>Propiedad</th><th>Período</th><th>Monto</th><th>Estado</th><th>Fecha</th></tr></thead><tbody>${ultPagos||'<tr><td colspan=6><div class="empty">Sin movimientos registrados</div></td></tr>'}</tbody></table></div>`;
}

function renderContratos(){
  const f=S.filtros;
  const lista=S.contratos.filter(c=>{
    let bOk=true;
    if(f.buscar){
      const q=f.buscar.toLowerCase();
      if(f.buscarPor==='inquilino') bOk=c.inquilino?.toLowerCase().includes(q);
      else if(f.buscarPor==='propietario'){
        const pr=getProp(c);const ow=getOwner(pr);
        bOk=ow?.nombre?.toLowerCase().includes(q);
      } else if(f.buscarPor==='domicilio'){
        const pr=getProp(c);
        bOk=pr?.direccion?.toLowerCase().includes(q);
      }
    }
    const eOk=f.estado==='todos'||c.estado===f.estado;
    return bOk&&eOk;
  });
  const rows=lista.map(c=>{
    const pr=getProp(c);const ow=getOwner(pr);
    const d=diasPara(c.fin);
    const dc=d<0?'var(--rojo)':d<60?'var(--naranja)':'var(--gris3)';
    const dt=d<0?`${Math.abs(d)}d vencido`:`${d}d`;
    return `<tr><td class="tdm">${c.inquilino}</td><td>${pr?.direccion||''} <span style="color:var(--gris4);font-size:10px">(${pr?.tipo||''})</span></td><td>${ow?.nombre||''}</td><td>${moneda(c.alquilerBase)}</td><td>${c.comisionAgencia}%</td><td>${c.inicio}</td><td>${c.fin}</td><td style="color:${dc};font-size:11px">${dt}</td><td>${badge(c.estado)}</td></tr>`;
  }).join('');
  return `
  <div class="filters">
    <div style="display:flex;border:1px solid var(--negro4);border-radius:6px;overflow:hidden">
      <select class="inp" style="border:none;border-radius:0;border-right:1px solid var(--negro4);background:var(--negro3)" onchange="setFiltro('buscarPor',this.value)">
        <option value="inquilino">Inquilino</option>
        <option value="propietario">Propietario</option>
        <option value="domicilio">Domicilio</option>
      </select>
      <input class="inp" placeholder="Buscar..." value="${f.buscar}" oninput="setFiltro('buscar',this.value)" style="border:none;border-radius:0;min-width:180px">
    </div>
    <select class="inp" onchange="setFiltro('estado',this.value)">
      <option value="todos">Todos los estados</option><option value="activo">Activos</option><option value="vencido">Vencidos</option>
    </select>
    <button class="btn primary" onclick="openModal('contrato')">+ Nuevo contrato</button>
  </div>
  <div class="tw"><table><thead><tr><th>Inquilino</th><th>Propiedad</th><th>Propietario</th><th>Alquiler</th><th>Com%</th><th>Inicio</th><th>Fin</th><th>Días</th><th>Estado</th></tr></thead><tbody>${rows||'<tr><td colspan=9><div class="empty">Sin resultados</div></td></tr>'}</tbody></table></div>`;
}

function renderPagos(){
  const f=S.filtros;
  const lista=S.pagos.filter(p=>f.estado==='todos'||p.estado===f.estado);
  const rows=lista.map(p=>{
    const c=getCont(p);const pr=c?getProp(c):null;
    const btn=(p.estado==='pendiente'||p.estado==='vencido')?`<button class="btn verde sm" onclick="cobrar('${p._id}')">✓ Cobrar</button>`:'';
    return `<tr><td class="tdm">${c?.inquilino||''}</td><td>${pr?.direccion||''}</td><td>${p.mes}</td><td>${moneda(p.monto)}</td><td>${badge(p.estado)}</td><td>${p.fecha||'—'}</td><td style="font-size:11px;color:var(--gris3)">${p.comprobante||'—'}</td><td>${btn}</td></tr>`;
  }).join('');
  return `
  <div class="filters">
    <select class="inp" onchange="setFiltro('estado',this.value)">
      <option value="todos">Todos</option><option value="cobrado">Cobrados</option><option value="pendiente">Pendientes</option><option value="vencido">Vencidos</option>
    </select>
    <button class="btn primary" onclick="openModal('pago')">+ Registrar pago</button>
  </div>
  <div class="tw"><table><thead><tr><th>Inquilino</th><th>Propiedad</th><th>Período</th><th>Monto</th><th>Estado</th><th>Fecha</th><th>Comprobante</th><th></th></tr></thead><tbody>${rows||'<tr><td colspan=8><div class="empty">Sin registros</div></td></tr>'}</tbody></table></div>`;
}

function renderLiquidaciones(){
  const meses=[...new Set(S.pagos.map(p=>p.mes))].sort().reverse();
  const mes=S.liqMes||meses[0]||'';
  const pagosMes=S.pagos.filter(p=>p.mes===mes&&p.estado==='cobrado');
  const cards=pagosMes.map(p=>{
    const c=getCont(p);const pr=c?getProp(c):null;const ow=getOwner(pr);
    const com=Math.round(p.monto*(c?.comisionAgencia||5)/100);
    const neto=p.monto-com;
    return `<div class="lcard">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
        <div><div style="font-size:14px;font-weight:600;color:var(--blanco)">${pr?.direccion||''} <span style="font-size:11px;font-weight:400;color:var(--gris3)">(${pr?.tipo||''})</span></div>
        <div style="font-size:11px;color:var(--gris3);margin-top:3px">Prop: ${ow?.nombre||''} · Inq: ${c?.inquilino||''}</div></div>
        ${badge('cobrado')}
      </div>
      <div class="lrow"><span>Alquiler cobrado</span><span>${moneda(p.monto)}</span></div>
      <div class="lrow lrow-red"><span>Comisión agencia (${c?.comisionAgencia||5}%)</span><span>− ${moneda(com)}</span></div>
      <div class="lrow tot"><span>A transferir al propietario</span><span style="color:var(--celeste)">${moneda(neto)}</span></div>
    </div>`;
  }).join('');
  const totB=pagosMes.reduce((s,p)=>s+p.monto,0);
  const totC=pagosMes.reduce((s,p)=>{const c=getCont(p);return s+Math.round(p.monto*(c?.comisionAgencia||5)/100);},0);
  const resumen=pagosMes.length>1?`<div class="lcard" style="border-color:var(--celeste);background:rgba(75,200,232,.05)">
    <div class="lrow"><span style="color:var(--gris2)">Total cobrado del mes</span><span style="color:var(--blanco)">${moneda(totB)}</span></div>
    <div class="lrow lrow-red"><span>Total comisiones agencia</span><span>− ${moneda(totC)}</span></div>
    <div class="lrow tot"><span>Total a transferir a propietarios</span><span style="color:var(--celeste)">${moneda(totB-totC)}</span></div>
  </div>`:'';
  return `
  <div class="filters" style="margin-bottom:18px">
    <select class="inp" onchange="setLiqMes(this.value)">
      ${meses.map(m=>`<option value="${m}" ${m===mes?'selected':''}>${m}</option>`).join('')}
    </select>
    <span style="font-size:11px;color:var(--gris3)">${pagosMes.length} liquidación(es) · <span style="color:var(--naranja)">Ingresos agencia: ${moneda(totC)}</span></span>
  </div>
  ${cards||'<div class="empty">Sin pagos cobrados en este período</div>'}${resumen}`;
}

function renderPropietarios(){
  const rows=S.propietarios.map(o=>{
    const props=S.propiedades.filter(p=>p.propietarioId===o.id||p.propietarioId===o._id);
    const activos=props.filter(p=>S.contratos.some(c=>(c.propiedadId===p.id||c.propiedadId===p._id)&&c.estado==='activo')).length;
    const plist=props.map(p=>`<span style="display:block;font-size:11px;color:var(--gris2)">${p.direccion} <span style="color:var(--gris4)">(${p.tipo})</span></span>`).join('');
    return `<tr><td class="tdm">${o.nombre}</td><td>${o.telefono||'—'}</td><td style="color:var(--celeste)">${o.email||'—'}</td><td>${plist||'—'}</td><td style="color:var(--naranja);font-weight:600">${activos}</td></tr>`;
  }).join('');
  return `
  <div class="filters">
    <button class="btn primary" onclick="openModal('propietario')">+ Propietario</button>
    <button class="btn" onclick="openModal('propiedad')">+ Propiedad</button>
  </div>
  <div class="tw"><table><thead><tr><th>Propietario</th><th>Teléfono</th><th>Email</th><th>Propiedades</th><th>Contratos activos</th></tr></thead><tbody>${rows||'<tr><td colspan=5><div class="empty">Sin propietarios</div></td></tr>'}</tbody></table></div>`;
}

function renderModal(){
  if(!S.modal) return '';
  let content='';
  const inp=(k,type='text',val='',extra='')=>`<input class="inp" style="width:100%" type="${type}" value="${val}" oninput="S.form['${k}']=this.value" ${extra}>`;
  const sel=(k,opts,extra='')=>`<select class="inp" style="width:100%" onchange="S.form['${k}']=this.value" ${extra}>${opts}</select>`;

  if(S.modal==='contrato'){
    const opts=S.propiedades.map(p=>`<option value="${p.id||p._id}">${p.direccion} — ${p.tipo}</option>`).join('');
    content=`<div class="mt"><div class="mt-icon">📋</div>Nuevo Contrato</div><div class="fg">
      <div class="fg-full"><label class="fl">Propiedad *</label>${sel('propiedadId','<option value="">Seleccionar...</option>'+opts)}</div>
      <div class="fg-full"><label class="fl">Inquilino *</label>${inp('inquilino')}</div>
      <div><label class="fl">DNI / CUIT</label>${inp('dni')}</div>
      <div><label class="fl">Teléfono</label>${inp('telefono')}</div>
      <div class="fg-full"><label class="fl">Email</label>${inp('email','email')}</div>
      <div><label class="fl">Fecha inicio *</label>${inp('inicio','date')}</div>
      <div><label class="fl">Fecha fin</label>${inp('fin','date')}</div>
      <div><label class="fl">Alquiler base ($)</label>${inp('alquilerBase','number')}</div>
      <div><label class="fl">Comisión agencia (%)</label>${inp('comisionAgencia','number','5')}</div>
      <div class="fg-full"><label class="fl">Garantía</label>${inp('garantia')}</div>
    </div><div class="fa"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn naranja" onclick="guardarContrato()">Guardar contrato</button></div>`;
  }
  if(S.modal==='pago'){
    const opts=S.contratos.filter(c=>c.estado==='activo').map(c=>{const p=getProp(c);return `<option value="${c.id||c._id}">${c.inquilino} — ${p?.direccion||''}</option>`;}).join('');
    content=`<div class="mt"><div class="mt-icon">💰</div>Registrar Pago</div><div class="fg">
      <div class="fg-full"><label class="fl">Contrato *</label>${sel('contratoId','<option value="">Seleccionar...</option>'+opts)}</div>
      <div><label class="fl">Período (ej: Junio 2025) *</label>${inp('mes')}</div>
      <div><label class="fl">Monto ($)</label>${inp('monto','number')}</div>
      <div><label class="fl">Fecha cobro</label>${inp('fecha','date',hoy())}</div>
      <div><label class="fl">Estado</label>${sel('estado','<option value="cobrado">Cobrado</option><option value="pendiente">Pendiente</option><option value="vencido">Vencido</option>')}</div>
      <div><label class="fl">N° Comprobante</label>${inp('comprobante')}</div>
    </div><div class="fa"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn naranja" onclick="guardarPago()">Guardar</button></div>`;
  }
  if(S.modal==='propietario'){
    content=`<div class="mt"><div class="mt-icon">👤</div>Nuevo Propietario</div><div class="fg">
      <div class="fg-full"><label class="fl">Nombre *</label>${inp('nombre')}</div>
      <div><label class="fl">Teléfono</label>${inp('telefono')}</div>
      <div><label class="fl">Email</label>${inp('email','email')}</div>
    </div><div class="fa"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn naranja" onclick="guardarPropietario()">Guardar</button></div>`;
  }
  if(S.modal==='propiedad'){
    const opts=S.propietarios.map(o=>`<option value="${o.id||o._id}">${o.nombre}</option>`).join('');
    content=`<div class="mt"><div class="mt-icon">🏠</div>Nueva Propiedad</div><div class="fg">
      <div class="fg-full"><label class="fl">Propietario *</label>${sel('propietarioId','<option value="">Seleccionar...</option>'+opts)}</div>
      <div class="fg-full"><label class="fl">Dirección *</label>${inp('direccion')}</div>
      <div><label class="fl">Tipo</label>${sel('tipo','<option>Casa</option><option>Dpto</option><option>Local</option><option>Campo</option><option>Oficina</option><option>Galpon</option>')}</div>
      <div><label class="fl">Descripción</label>${inp('descripcion')}</div>
    </div><div class="fa"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn naranja" onclick="guardarPropiedad()">Guardar</button></div>`;
  }
  return `<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><button class="mc" onclick="closeModal()">✕</button>${content}</div></div>`;
}

const NAVS=[
  {id:'dashboard',ic:'▦',lbl:'Dashboard'},
  {id:'contratos',ic:'◻',lbl:'Contratos'},
  {id:'pagos',ic:'$',lbl:'Pagos / Cobranza'},
  {id:'liquidaciones',ic:'≡',lbl:'Liquidaciones'},
  {id:'propietarios',ic:'◉',lbl:'Propietarios'},
];
const TITLES={
  dashboard:['Resumen general','Vista general de la cartera activa'],
  contratos:['Contratos','Registro y seguimiento de contratos de alquiler'],
  pagos:['Pagos y Cobranza','Control de pagos de inquilinos'],
  liquidaciones:['Liquidaciones','Liquidación mensual a propietarios'],
  propietarios:['Propietarios y Propiedades','Gestión del padrón'],
};

function render(){
  const [pt,ps]=TITLES[S.seccion];
  let body='';
  if(S.loading) body=`<div class="loading"><div class="spinner"></div>Conectando con Firebase...</div>`;
  else if(S.seccion==='dashboard') body=renderDashboard();
  else if(S.seccion==='contratos') body=renderContratos();
  else if(S.seccion==='pagos') body=renderPagos();
  else if(S.seccion==='liquidaciones') body=renderLiquidaciones();
  else if(S.seccion==='propietarios') body=renderPropietarios();

  $('app').innerHTML=`
  <div class="app">
    <aside class="sidebar">
      <div class="logo-wrap">
        <div class="logo-icon">
          ${logoSVG(38)}
          <div class="logo-texts">
            <div class="logo-brand">ECKERDT<br><span>INMOBILIARIA</span></div>
          </div>
        </div>
        <div class="logo-sub">Urdinarrain · Entre Ríos</div>
      </div>
      <ul class="nav">
        ${NAVS.map(n=>`<li class="${S.seccion===n.id?'on':''}" onclick="go('${n.id}')"><span class="ic">${n.ic}</span>${n.lbl}</li>`).join('')}
      </ul>
      <div class="sync-bar"><div class="sync-dot ${S.synced?'':'off'}"></div>${S.synced?'Sincronizado · Firebase':S.loading?'Conectando...':'Sin conexión'}</div>
      <div class="sidebar-foot">© 2025 Eckerdt Negocios Inmobiliarios</div>
    </aside>
    <main class="main">
      <div class="ph">
        <div class="ph-line">
          <div><div class="pt">${pt}</div><div class="ps">${ps}</div></div>
        </div>
      </div>
      ${body}
    </main>
  </div>
  ${renderModal()}`;
}

render();
cargarTodo();
</script>
</body>
</html>
