<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eckerdt Inmobiliaria — Admin Alquileres</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --negro:#0A0A0A;--negro2:#141414;--negro3:#1e1e1e;--negro4:#2a2a2a;
  --celeste:#4BC8E8;--azul:#3A9DB5;--petroleo:#2B6B7A;
  --naranja:#F5A623;--naranja2:#e09010;
  --blanco:#ffffff;--gris2:#cccccc;--gris3:#888888;--gris4:#555555;
  --verde:#27ae60;--rojo:#e74c3c;--amarillo:#f39c12;
}
body{background:var(--negro);color:var(--blanco);font-family:'Inter',sans-serif;font-size:13px}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:var(--negro2);border:1px solid var(--negro4);border-radius:16px;padding:40px;width:380px}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;justify-content:center}
.login-title{font-size:15px;font-weight:700;text-align:center}.login-title span{color:var(--celeste)}
.login-sub{font-size:11px;color:var(--gris3);text-align:center;margin-top:3px;letter-spacing:.5px}
.login-form{display:flex;flex-direction:column;gap:14px;margin-top:28px}
.login-field label{font-size:10px;color:var(--gris3);letter-spacing:.6px;text-transform:uppercase;display:block;margin-bottom:5px;font-weight:500}
.login-input{width:100%;padding:11px 14px;font-family:'Inter',sans-serif;font-size:13px;border:1px solid var(--negro4);border-radius:8px;background:var(--negro3);color:var(--blanco);outline:none;transition:border-color .15s}
.login-input:focus{border-color:var(--celeste)}
.login-btn{width:100%;padding:12px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:none;border-radius:8px;background:linear-gradient(135deg,var(--celeste),var(--azul));color:var(--negro);transition:opacity .15s;margin-top:4px}
.login-btn:hover{opacity:.9}.login-btn:disabled{opacity:.5;cursor:not-allowed}
.login-error{background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.3);border-radius:8px;padding:10px 14px;font-size:12px;color:#ff7b6b;display:none;text-align:center}
.login-footer{font-size:10px;color:var(--gris4);text-align:center;margin-top:24px}

/* APP */
.app{display:flex;min-height:100vh}
.sidebar{width:220px;min-height:100vh;background:var(--negro2);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100;border-right:1px solid var(--negro4)}
.logo-wrap{padding:20px 16px 16px;border-bottom:1px solid var(--negro4)}
.logo-row{display:flex;align-items:center;gap:9px;margin-bottom:6px}
.logo-brand{font-size:13px;font-weight:700;line-height:1.3}.logo-brand span{color:var(--celeste)}
.logo-sub{font-size:9px;color:var(--gris4);letter-spacing:1px;text-transform:uppercase}
.nav{list-style:none;padding:8px 0;flex:1}
.nav li{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;font-size:12px;color:var(--gris3);border-left:2px solid transparent;transition:all .12s}
.nav li:hover{color:var(--blanco);background:var(--negro3)}
.nav li.on{color:var(--celeste);border-left-color:var(--naranja);background:rgba(75,200,232,.06)}
.nav-user{padding:10px 16px;border-top:1px solid var(--negro4);font-size:11px;color:var(--gris3);display:flex;align-items:center;justify-content:space-between}
.nav-user strong{color:var(--blanco);font-size:12px}
.logout-btn{background:none;border:1px solid var(--negro4);border-radius:4px;color:var(--gris3);font-size:10px;padding:3px 8px;cursor:pointer;font-family:'Inter',sans-serif}
.logout-btn:hover{color:var(--rojo);border-color:var(--rojo)}
.sync-bar{display:flex;align-items:center;gap:6px;padding:8px 16px;font-size:10px;color:var(--gris4);border-top:1px solid var(--negro4)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--verde);flex-shrink:0}
.sync-dot.off{background:var(--rojo)}
.sidebar-foot{padding:8px 16px;font-size:10px;color:var(--gris4);border-top:1px solid var(--negro4)}
.main{margin-left:220px;flex:1;padding:24px 28px}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--negro4)}
.ph-left{display:flex;align-items:center;gap:10px}
.ph-accent{width:3px;height:24px;background:linear-gradient(180deg,var(--naranja),var(--celeste));border-radius:2px}
.pt{font-size:20px;font-weight:700}.ps{font-size:11px;color:var(--gris3);margin-top:2px}

/* BOTONES */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--negro4);background:var(--negro3);color:var(--blanco);border-radius:6px;transition:all .12s}
.btn:hover{background:var(--negro4)}
.btn.primary{background:linear-gradient(135deg,var(--celeste),var(--azul));border-color:var(--celeste);color:var(--negro);font-weight:600}
.btn.naranja{background:var(--naranja);border-color:var(--naranja);color:var(--negro);font-weight:600}
.btn.verde{background:var(--verde);border-color:var(--verde);color:#fff}
.btn.rojo{background:var(--rojo);border-color:var(--rojo);color:#fff}
.btn.sm{padding:4px 9px;font-size:11px}

/* KPI */
.kgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kcard{background:var(--negro2);border:1px solid var(--negro4);border-radius:10px;padding:16px;border-top:3px solid}
.klbl{font-size:10px;color:var(--gris3);letter-spacing:.7px;text-transform:uppercase;margin-bottom:5px}
.kval{font-size:22px;font-weight:700;line-height:1}.ksub{font-size:10px;color:var(--gris3);margin-top:5px}

/* ALERTAS */
.alerts{display:flex;flex-direction:column;gap:7px;margin-bottom:18px}
.alert{display:flex;align-items:flex-start;gap:10px;background:var(--negro2);border:1px solid var(--negro4);border-left:3px solid;border-radius:8px;padding:10px 13px;font-size:11px}
.alert strong{display:block;font-weight:500;color:var(--blanco);margin-bottom:2px}
.alert span{color:var(--gris3)}
.stitle{font-size:11px;font-weight:600;color:var(--gris3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:9px;display:flex;align-items:center;gap:8px}
.stitle::after{content:'';flex:1;height:1px;background:var(--negro4)}

/* TABLA */
.tw{background:var(--negro2);border:1px solid var(--negro4);border-radius:10px;overflow:hidden;margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:11px}
thead tr{background:var(--negro3);border-bottom:1px solid var(--negro4)}
th{padding:9px 12px;text-align:left;font-size:10px;color:var(--gris3);letter-spacing:.7px;text-transform:uppercase;font-weight:500}
td{padding:9px 12px;color:var(--gris2);border-bottom:1px solid var(--negro4)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(75,200,232,.03)}
.tdm{color:var(--blanco);font-weight:500}.tds{font-size:10px;color:var(--gris3)}
tr.clickable{cursor:pointer}
tr.clickable:hover td{background:rgba(75,200,232,.07)}

/* BADGES */
.badge{display:inline-block;padding:2px 8px;font-size:10px;font-weight:600;border-radius:20px}
.bg{background:rgba(39,174,96,.15);color:#5ddb8a;border:1px solid rgba(39,174,96,.25)}
.br{background:rgba(231,76,60,.15);color:#ff7b6b;border:1px solid rgba(231,76,60,.25)}
.by{background:rgba(243,156,18,.15);color:#f5c842;border:1px solid rgba(243,156,18,.25)}
.bgr{background:var(--negro3);color:var(--gris3);border:1px solid var(--negro4)}

/* FILTROS */
.filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.inp{padding:7px 10px;font-family:'Inter',sans-serif;font-size:12px;border:1px solid var(--negro4);border-radius:6px;background:var(--negro2);color:var(--blanco);outline:none;transition:border-color .12s}
.inp:focus{border-color:var(--celeste)}.inp option{background:var(--negro2)}
.search-combo{display:flex;border:1px solid var(--negro4);border-radius:6px;overflow:hidden}
.search-combo select{border:none;border-right:1px solid var(--negro4);background:var(--negro3);padding:7px 10px;font-family:'Inter',sans-serif;font-size:12px;color:var(--blanco);outline:none}
.search-combo input{border:none;background:var(--negro2);padding:7px 10px;font-family:'Inter',sans-serif;font-size:12px;color:var(--blanco);outline:none;min-width:180px}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(4px)}
.modal{background:var(--negro2);border:1px solid var(--negro4);border-radius:12px;width:620px;max-height:92vh;overflow-y:auto;padding:26px;position:relative}
.modal.lg{width:720px}
.modal::-webkit-scrollbar{width:4px}
.modal::-webkit-scrollbar-thumb{background:var(--negro4);border-radius:2px}
.mt{font-size:16px;font-weight:700;margin-bottom:18px;padding-bottom:11px;border-bottom:1px solid var(--negro4);display:flex;align-items:center;gap:8px}
.mt-icon{width:26px;height:26px;border-radius:6px;background:linear-gradient(135deg,var(--celeste),var(--azul));display:flex;align-items:center;justify-content:center;font-size:13px}
.mc{position:absolute;top:14px;right:14px;background:var(--negro3);border:1px solid var(--negro4);border-radius:6px;font-size:13px;cursor:pointer;color:var(--gris3);width:26px;height:26px;display:flex;align-items:center;justify-content:center}
.mc:hover{color:var(--blanco)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
.fg-full{grid-column:1/-1}
label.fl{font-size:10px;color:var(--gris3);letter-spacing:.5px;text-transform:uppercase;display:block;margin-bottom:4px;font-weight:500}
.fa{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:13px;border-top:1px solid var(--negro4)}
.form-section{margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--negro4)}
.form-section-title{font-size:11px;font-weight:600;color:var(--celeste);letter-spacing:.5px;text-transform:uppercase;margin-bottom:11px}

/* FICHA CONTRATO */
.ficha-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.ficha-campo{background:var(--negro3);border-radius:8px;padding:12px}
.ficha-campo-lbl{font-size:10px;color:var(--gris3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
.ficha-campo-val{font-size:13px;color:var(--blanco);font-weight:500}
.ficha-campo-val.big{font-size:20px;color:var(--celeste);font-weight:700}
.ficha-sep{grid-column:1/-1;height:1px;background:var(--negro4)}

/* EXTRAS */
.extras-list{display:flex;flex-direction:column;gap:7px;margin-bottom:8px}
.extra-item{display:flex;align-items:center;gap:8px;background:var(--negro3);border:1px solid var(--negro4);border-radius:6px;padding:8px 10px}
.extra-item input{flex:1;background:transparent;border:none;color:var(--blanco);font-family:'Inter',sans-serif;font-size:12px;outline:none}
.extra-item input::placeholder{color:var(--gris4)}
.extra-remove{background:none;border:none;color:var(--gris4);cursor:pointer;font-size:14px;padding:0 2px}
.extra-remove:hover{color:var(--rojo)}

/* RESUMEN PAGO */
.resumen-pago{background:var(--negro3);border:1px solid var(--negro4);border-radius:8px;padding:14px;margin-top:14px}
.resumen-row{display:flex;justify-content:space-between;padding:5px 0;font-size:12px;color:var(--gris2);border-bottom:1px solid var(--negro4)}
.resumen-row:last-child{border:none;font-weight:700;font-size:14px;color:var(--blanco);padding-top:8px}
.resumen-row.red{color:#ff7b6b}
.resumen-row.green{color:#5ddb8a}
.resumen-row.blue{color:var(--celeste)}

/* LIQUIDACION */
.lcard{background:var(--negro2);border:1px solid var(--negro4);border-radius:10px;padding:18px;margin-bottom:12px}
.lrow{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--negro4);font-size:12px;color:var(--gris2)}
.lrow:last-child{border-bottom:none}
.lrow.tot{font-weight:700;font-size:13px;color:var(--blanco);border-top:1px solid var(--negro4);border-bottom:none;margin-top:2px;padding-top:9px}
.lrow-red{color:#ff7b6b}.lrow-green{color:#5ddb8a}.lrow-blue{color:var(--celeste)}

/* TAG */
.tag{display:inline-block;padding:2px 8px;font-size:10px;border-radius:4px;background:rgba(75,200,232,.1);color:var(--celeste);border:1px solid rgba(75,200,232,.2);margin:1px}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;height:100px;font-size:12px;color:var(--gris3);gap:10px}
.spinner{width:16px;height:16px;border:2px solid var(--negro4);border-top-color:var(--celeste);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
.toast{position:fixed;bottom:18px;right:18px;background:var(--negro2);border:1px solid var(--celeste);color:var(--blanco);padding:10px 16px;font-size:12px;border-radius:8px;opacity:0;transition:opacity .3s;z-index:999;pointer-events:none;display:flex;align-items:center;gap:8px}
.toast.show{opacity:1}.toast-dot{width:7px;height:7px;border-radius:50%}
.empty{text-align:center;padding:36px;color:var(--gris4);font-size:12px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--negro4);border-radius:3px}
</style>
</head>
<body>
<div id="root"></div>
<div class="toast" id="toast"><div class="toast-dot" id="tdot"></div><span id="tmsg"></span></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const FC = {
  apiKey:"AIzaSyDnsmUuwjiT2Gzq3y9NAvxaeFEmn3LTMw4",
  authDomain:"alquileres-eckerdt.firebaseapp.com",
  projectId:"alquileres-eckerdt",
  storageBucket:"alquileres-eckerdt.firebasestorage.app",
  messagingSenderId:"368148074641",
  appId:"1:368148074641:web:4369af59f3e7b2f3daef30"
};
const fireApp = initializeApp(FC);
const db = getFirestore(fireApp);
const auth = getAuth(fireApp);

let S = {
  sec:'dashboard', usuario:null,
  propietarios:[], propiedades:[], contratos:[], pagos:[], inquilinos:[],
  modal:null, contratoActivo:null, form:{}, formExtras:[],
  filtros:{buscar:'',buscarPor:'inquilino',estado:'todos'},
  liqMes:'', loading:true, synced:false,
};

const $=id=>document.getElementById(id);
const moneda=n=>'$'+Math.round(n||0).toLocaleString('es-AR');
const hoy=()=>new Date().toISOString().split('T')[0];
const diasPara=fin=>Math.round((new Date(fin)-new Date())/86400000);
const mesActual=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');};
const mesNombre=m=>{if(!m)return'';const meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];const p=m.split('-');if(p.length===2)return meses[+p[1]-1]+' '+p[0];return m;};

function toast(msg,ok=true){
  $('tmsg').textContent=msg;
  $('tdot').style.background=ok?'#4BC8E8':'#e74c3c';
  $('toast').classList.add('show');
  setTimeout(()=>$('toast').classList.remove('show'),2500);
}

function badge(e){
  const m={activo:'bg Activo',cobrado:'bg Cobrado',pendiente:'by Pendiente',vencido:'br Vencido'};
  const[c,l]=(m[e]||'bgr '+e).split(' ');
  return '<span class="badge '+c+'">'+l+'</span>';
}

function logoSVG(s){s=s||32;
  return '<svg width="'+s+'" height="'+(s*.78)+'" viewBox="0 0 46 36" fill="none">'+
    '<polygon points="2,34 14,4 20,16" fill="#4BC8E8"/>'+
    '<polygon points="14,4 20,16 23,20" fill="#2B6B7A"/>'+
    '<polygon points="23,20 26,16 32,4" fill="#2B6B7A"/>'+
    '<polygon points="26,16 32,4 44,34" fill="#3A9DB5"/>'+
    '<circle cx="23" cy="3" r="4" fill="#F5A623"/>'+
    '<circle cx="23" cy="3" r="1.8" fill="#0A0A0A"/>'+
  '</svg>';
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
onAuthStateChanged(auth,user=>{
  if(user){S.usuario=user;cargarTodo();}
  else{S.usuario=null;S.loading=false;renderLogin();}
});

window.doLogin=async()=>{
  const email=$('l-email').value.trim();
  const pass=$('l-pass').value;
  const btn=$('l-btn');const err=$('l-err');
  if(!email||!pass){err.textContent='Completá usuario y contraseña';err.style.display='block';return;}
  btn.disabled=true;btn.textContent='Ingresando...';err.style.display='none';
  try{await signInWithEmailAndPassword(auth,email,pass);}
  catch(e){err.textContent='Usuario o contraseña incorrectos';err.style.display='block';btn.disabled=false;btn.textContent='Ingresar';}
};
window.doLogout=async()=>{await signOut(auth);S={...S,sec:'dashboard',propietarios:[],propiedades:[],contratos:[],pagos:[],inquilinos:[],synced:false};};

// ── FIREBASE ──────────────────────────────────────────────────────────────────
async function fbAdd(col,data){
  try{const r=await addDoc(collection(db,col),{...data,_ts:Date.now()});toast('Guardado ✓');return r.id;}
  catch(e){toast('Error: '+e.message,false);return null;}
}
async function fbUpd(col,id,data){
  try{await updateDoc(doc(db,col,id),{...data,_ts:Date.now()});toast('Actualizado ✓');}
  catch(e){toast('Error: '+e.message,false);}
}

async function cargarTodo(){
  S.loading=true;render();
  try{
    for(const col of ['propietarios','propiedades','contratos','pagos','inquilinos']){
      const snap=await getDocs(collection(db,col));
      S[col]=snap.docs.map(d=>({...d.data(),_id:d.id}));
    }
    const meses=[...new Set(S.pagos.map(p=>p.mes))].sort().reverse();
    S.liqMes=meses[0]||mesActual();
    S.synced=true;
  }catch(e){toast('Error: '+e.message,false);}
  S.loading=false;render();
}

// ── ACCIONES ──────────────────────────────────────────────────────────────────
window.go=s=>{S.sec=s;S.modal=null;S.contratoActivo=null;S.filtros={buscar:'',buscarPor:'inquilino',estado:'todos'};render();};
window.openModal=t=>{S.modal=t;S.form={comisionAgencia:5,estado:'activo',tipo:'Casa',frecActualizacion:6,indiceActualizacion:'IPC'};S.formExtras=[];render();};
window.closeModal=()=>{S.modal=null;S.contratoActivo=null;render();};
window.setFiltro=(k,v)=>{S.filtros[k]=v;render();};
window.setLiqMes=v=>{S.liqMes=v;render();};
window.addExtra=()=>{S.formExtras.push({desc:'',monto:0});render();};
window.removeExtra=i=>{S.formExtras.splice(i,1);render();};
window.updExtra=(i,k,v)=>{S.formExtras[i][k]=k==='monto'?+(v||0):v;render();};

window.abrirContrato=cid=>{
  S.contratoActivo=S.contratos.find(x=>x._id===cid);
  if(!S.contratoActivo)return;
  S.modal='contrato_detalle';
  S.form={
    mes:mesActual(),
    alquiler:S.contratoActivo.alquilerBase||0,
    fechaCobro:hoy(),
    comprobante:'',
    estado:'cobrado'
  };
  render();
};

window.cobrar=async(pid)=>{
  const p=S.pagos.find(x=>x._id===pid);if(!p)return;
  const upd={estado:'cobrado',fechaCobro:hoy()};
  await fbUpd('pagos',pid,upd);
  S.pagos=S.pagos.map(x=>x._id===pid?{...x,...upd}:x);render();
};

window.registrarPago=async()=>{
  const c=S.contratoActivo;if(!c)return;
  const f=S.form;
  if(!f.mes)return toast('Ingresá el período',false);
  const extras=(c.extras||[]).map(e=>({desc:e.desc,monto:+(e.monto||0)}));
  const totalExtras=extras.reduce((s,e)=>s+e.monto,0);
  const alq=+(f.alquiler||c.alquilerBase||0);
  const totalInquilino=alq+totalExtras;
  const com=Math.round(alq*(c.comisionAgencia||5)/100);
  const netoProp=alq-com;
  const nroComp=f.comprobante||('REC-'+Date.now().toString().slice(-6));
  const data={
    contratoId:c._id,
    inquilino:c.inquilino||'',
    direccion:c.direccion||'',
    propietarioNombre:c.propietarioNombre||'',
    mes:f.mes,
    alquiler:alq,
    extras:extras,
    totalExtras:totalExtras,
    totalInquilino:totalInquilino,
    comision:com,
    netoPropiertario:netoProp,
    total:totalInquilino,
    fechaCobro:f.fechaCobro||hoy(),
    estado:f.estado||'cobrado',
    comprobante:nroComp,
    comisionAgencia:c.comisionAgencia||5,
  };
  const id=await fbAdd('pagos',data);
  if(id){
    S.pagos.unshift({...data,_id:id});

    setTimeout(()=>{

    setTimeout(()=>{

    },1000);
    S.modal=null;S.contratoActivo=null;render();
  }
};

window.actualizarAlquiler=async(cid)=>{

// ── PRÓXIMAS ACTUALIZACIONES ──────────────────────────────────────────────────
function getProxActualizacion(c){
  if(!c.frecActualizacion||!c.inicio)return null;
  const base=new Date(c.ultimaActualizacion||c.inicio);
  const prox=new Date(base);
  prox.setMonth(prox.getMonth()+(+(c.frecActualizacion||6)));
  return prox;
}

function renderDashboard(){
  const activos=S.contratos.filter(c=>c.estado==='activo');
  const totalAlq=activos.reduce((s,c)=>s+c.alquilerBase,0);
  const totalCom=activos.reduce((s,c)=>s+(c.alquilerBase*(c.comisionAgencia||5)/100),0);
  const pend=S.pagos.filter(p=>p.estado==='pendiente'||p.estado==='vencido');
  const montoPend=pend.reduce((s,p)=>s+(p.total||p.monto||0),0);

  // Alertas
  const alertas=[];
  
  // Vencimientos en 60 días
  activos.forEach(c=>{
    if(!c.fin)return;
    const d=diasPara(c.fin);
    if(d<0) alertas.push({col:'var(--rojo)',icon:'⚠️',t:'Contrato VENCIDO: '+(c.direccion||''),s:c.inquilino+' · Venció el '+c.fin});
    else if(d<=60) alertas.push({col:'var(--naranja)',icon:'📋',t:'Vence en '+d+' días: '+(c.direccion||''),s:c.inquilino+' · '+c.fin});
  });

  // Actualizaciones pendientes o próximas (30 días)
  activos.forEach(c=>{
    const prox=getProxActualizacion(c);
    if(!prox)return;
    const du=Math.round((prox-new Date())/86400000);
    if(du<0) alertas.push({col:'var(--amarillo)',icon:'🔄',t:'Actualizar alquiler: '+(c.direccion||''),s:c.inquilino+' · Debía actualizarse hace '+Math.abs(du)+' días ('+( c.indiceActualizacion||'IPC')+')'});
    else if(du<=30) alertas.push({col:'var(--celeste)',icon:'🔄',t:'Próxima actualización: '+(c.direccion||''),s:c.inquilino+' · En '+du+' días ('+( c.indiceActualizacion||'IPC')+')'});
  });

  // Pagos vencidos
  S.pagos.filter(p=>p.estado==='vencido').forEach(p=>{
    alertas.push({col:'var(--rojo)',icon:'💰',t:'Pago vencido: '+(p.direccion||''),s:(p.inquilino||'')+' · '+mesNombre(p.mes)+' · '+moneda(p.total||p.monto||0)});
  });

  const ultPagos=S.pagos.slice(0,6).map(p=>{
    return '<tr><td class="tdm">'+(p.inquilino||'')+'</td><td>'+(p.direccion||'')+'</td><td>'+mesNombre(p.mes)+'</td><td>'+moneda(p.alquiler||0)+'</td><td>'+(p.totalExtras>0?moneda(p.totalExtras):'—')+'</td><td><strong>'+moneda(p.totalInquilino||p.total||p.monto||0)+'</strong></td><td>'+badge(p.estado)+'</td></tr>';
  }).join('');

  return '<div class="kgrid">'+
    '<div class="kcard" style="border-top-color:var(--celeste)"><div class="klbl">Contratos activos</div><div class="kval">'+activos.length+'</div><div class="ksub">de '+S.contratos.length+' totales</div></div>'+
    '<div class="kcard" style="border-top-color:var(--naranja)"><div class="klbl">Alquileres / mes</div><div class="kval" style="font-size:17px">'+moneda(totalAlq)+'</div><div class="ksub">cartera activa</div></div>'+
    '<div class="kcard" style="border-top-color:var(--verde)"><div class="klbl">Comisiones / mes</div><div class="kval" style="font-size:17px">'+moneda(totalCom)+'</div><div class="ksub">honorarios agencia</div></div>'+
    '<div class="kcard" style="border-top-color:var(--rojo)"><div class="klbl">Saldo pendiente</div><div class="kval" style="font-size:17px">'+moneda(montoPend)+'</div><div class="ksub">'+pend.length+' cuota(s)</div></div>'+
  '</div>'+
  (alertas.length?'<div class="stitle">Alertas</div><div class="alerts">'+alertas.map(a=>'<div class="alert" style="border-left-color:'+a.col+'"><span style="font-size:16px">'+a.icon+'</span><div><strong>'+a.t+'</strong><span>'+a.s+'</span></div></div>').join('')+'</div>':'')+
  '<div class="stitle">Últimos movimientos</div>'+
  '<div class="tw"><table><thead><tr><th>Inquilino</th><th>Propiedad</th><th>Período</th><th>Alquiler</th><th>Extras</th><th>Total</th><th>Estado</th></tr></thead>'+
  '<tbody>'+(ultPagos||'<tr><td colspan=7><div class="empty">Sin movimientos</div></td></tr>')+'</tbody></table></div>';

function renderLiquidaciones(){
  const meses=[...new Set(S.pagos.map(p=>p.mes))].sort().reverse();
  const mes=S.liqMes||meses[0]||mesActual();
  const pagosMes=S.pagos.filter(p=>p.mes===mes&&p.estado==='cobrado');
  const cards=pagosMes.map(p=>{
    const alq=p.alquiler||p.monto||0;
    const com=p.comision||Math.round(alq*(p.comisionAgencia||5)/100);
    const neto=p.netoPropiertario||(alq-com);
    const extrasHtml=(p.extras||[]).map(e=>'<div class="lrow lrow-blue"><span>'+e.desc+' (cargo inquilino)</span><span>'+moneda(e.monto)+'</span></div>').join('');
    return '<div class="lcard">'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">'+
        '<div>'+
          '<div style="font-size:14px;font-weight:600">'+(p.direccion||'')+'</div>'+
          '<div style="font-size:11px;color:var(--gris3);margin-top:3px">Prop: '+(p.propietarioNombre||'')+' · Inq: '+(p.inquilino||'')+'</div>'+
        '</div>'+badge('cobrado')+
      '</div>'+
      '<div class="lrow"><span>Alquiler</span><span>'+moneda(alq)+'</span></div>'+
      extrasHtml+
      '<div class="lrow"><span><strong>Total cobrado al inquilino</strong></span><span><strong>'+moneda(p.totalInquilino||alq)+'</strong></span></div>'+
      '<div class="lrow lrow-red"><span>Comisión agencia ('+(p.comisionAgencia||5)+'%)</span><span>− '+moneda(com)+'</span></div>'+
      '<div class="lrow tot"><span>A transferir al propietario</span><span class="lrow-green">'+moneda(neto)+'</span></div>'+
      '<div style="margin-top:10px;display:flex;gap:6px">'+
        '<button class="btn sm" onclick="emitirPDFPropietario(\''+p._id+'\')">📄 PDF Propietario</button>'+
        '<button class="btn sm" onclick="emitirPDFInquilino(\''+p._id+'\')">📄 PDF Inquilino</button>'+
      '</div>'+
    '</div>';
  }).join('');

  const totAlq=pagosMes.reduce((s,p)=>s+(p.alquiler||p.monto||0),0);
  const totCom=pagosMes.reduce((s,p)=>s+(p.comision||Math.round((p.alquiler||p.monto||0)*(p.comisionAgencia||5)/100)),0);
  const totExtras=pagosMes.reduce((s,p)=>s+(p.totalExtras||0),0);
  const resumen=pagosMes.length>1?
    '<div class="lcard" style="border-color:var(--celeste);background:rgba(75,200,232,.04)">'+
      '<div class="lrow"><span>Total alquileres</span><span>'+moneda(totAlq)+'</span></div>'+
      '<div class="lrow lrow-blue"><span>Total extras cobrados</span><span>'+moneda(totExtras)+'</span></div>'+
      '<div class="lrow"><span><strong>Total cobrado a inquilinos</strong></span><span><strong>'+moneda(totAlq+totExtras)+'</strong></span></div>'+
      '<div class="lrow lrow-red"><span>Total comisiones agencia</span><span>− '+moneda(totCom)+'</span></div>'+
      '<div class="lrow tot"><span>Total a transferir propietarios</span><span class="lrow-green">'+moneda(totAlq-totCom)+'</span></div>'+
    '</div>':'';

  return '<div class="filters" style="margin-bottom:18px">'+
    '<select class="inp" onchange="setLiqMes(this.value)">'+meses.map(m=>'<option value="'+m+'" '+(m===mes?'selected':'')+'>'+mesNombre(m)+'</option>').join('')+'</select>'+
    '<span style="font-size:11px;color:var(--gris3)">'+pagosMes.length+' liquidación(es) · <span style="color:var(--naranja)">Ingresos agencia: '+moneda(totCom)+'</span></span>'+
  '</div>'+
  (cards||'<div class="empty">Sin pagos cobrados en este período</div>')+resumen;
}

function renderInquilinos(){
  const todos={};
  S.contratos.forEach(c=>{if(!c.inquilino)return;if(!todos[c.inquilino])todos[c.inquilino]={nombre:c.inquilino,dni:c.dni||'',telefono:c.telefono||'',email:c.email||'',contratos:[]};todos[c.inquilino].contratos.push(c);});
  S.inquilinos.forEach(i=>{if(!todos[i.nombre])todos[i.nombre]={...i,contratos:[]};else todos[i.nombre]={...todos[i.nombre],...i};});
  const lista=Object.values(todos);
  const f=S.filtros.buscar.toLowerCase();
  const filtrados=f?lista.filter(i=>(i.nombre||'').toLowerCase().includes(f)):lista;
  const rows=filtrados.map(i=>{

function renderPropietarios(){
  const f=S.filtros.buscar.toLowerCase();

    const props=S.propiedades.filter(p=>p.propietarioNombre===o.nombre||p.propietarioId===o._id);

        '</div>'+
        '<ul class="nav">'+NAVS.map(n=>'<li class="'+(S.sec===n.id?'on':'')+'" onclick="go(\''+n.id+'\')"><span>'+n.ic+'</span>'+n.lbl+'</li>').join('')+'</ul>'+
        '<div class="nav-user"><div><div style="font-size:10px;color:var(--gris4)">Usuario</div><strong>'+userLabel+'</strong></div><button class="logout-btn" onclick="doLogout()">Salir</button></div>'+
        '<div class="sync-bar"><div class="sync-dot '+(S.synced?'':'off')+'"></div>'+(S.synced?'Sincronizado · Firebase':S.loading?'Cargando...':'Sin conexión')+'</div>'+
        '<div class="sidebar-foot">© 2025 Eckerdt Negocios Inmobiliarios</div>'+
      '</aside>'+
      '<main class="main">'+
        '<div class="ph"><div class="ph-left"><div class="ph-accent"></div><div><div class="pt">'+pt+'</div><div class="ps">'+ps+'</div></div></div></div>'+
        body+
      '</main>'+
    '</div>'+
    renderModal();
}

render();
cargarTodo();
</script>
